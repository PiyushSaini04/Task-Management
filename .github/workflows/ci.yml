name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8 Linter
        run: |
          flake8 backend/app --max-line-length=120

  build-and-test:
    needs: [lint-frontend, lint-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up environment config
        run: cp .env.example .env

      - name: Build and run docker containers
        run: docker compose up --build -d

      - name: Show running containers
        run: docker compose ps

      - name: Show container logs
        run: docker compose logs

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:5000/api/v1/health; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 5
          done

          echo "Backend failed to start"
          docker compose logs
          exit 1

      - name: Verify health check
        run: |
          curl --fail -s http://localhost:5000/api/v1/health

      - name: Verify task creation (POST /api/v1/tasks returns 201)
        run: |
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST -H "Content-Type: application/json" -d '{"title": "CI Test Task", "description": "Verify CI works"}' http://localhost:5000/api/v1/tasks)
          echo "POST Status: $STATUS_CODE"
          if [ "$STATUS_CODE" -ne 201 ]; then
            echo "Expected 201 but got $STATUS_CODE"
            exit 1
          fi

      - name: Verify task listing (GET /api/v1/tasks returns 200 and non-empty list)
        run: |
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/v1/tasks)
          echo "GET Status: $STATUS_CODE"
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Expected 200 but got $STATUS_CODE"
            exit 1
          fi
          
          # Check that the list is non-empty and contains our created task
          CONTENT=$(curl -s http://localhost:5000/api/v1/tasks)
          echo "GET Content: $CONTENT"
          if ! echo "$CONTENT" | grep -q "CI Test Task"; then
            echo "Created task was not found in listing!"
            exit 1
          fi

      - name: Shut down docker containers
        if: always()
        run: docker compose down
